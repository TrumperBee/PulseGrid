    :root {

      --accent-amber: #FFB800;
      --accent-red: #FF3366;
      --text-primary: #E8E8F0;
      --text-secondary: #6B6B8A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
    h1,h2,h3,h4,h5,h6 { font-family: 'Syne', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 60px 60px; animation: gridMove 30s linear infinite; pointer-events: none; z-index: -2; }
    .scanline { position: fixed; inset: 0; pointer-events: none; z-index: 9998; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px); }
    
    @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(60px,60px); } }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
    @keyframes floatUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    
    .animate-pulse { animation: shimmer 1.5s infinite; background: linear-gradient(90deg, rgba(26,26,46,1) 0%, rgba(40,40,70,1) 50%, rgba(26,26,46,1) 100%); background-size: 200% 100%; }
    @keyframes driftUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.15; } 100% { transform: translateY(-100vh) rotate(10deg); opacity: 0; } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .card-glass { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; transition: all 0.3s ease; }
    .card-glass:hover { border-color: rgba(0,245,255,0.3); transform: translateY(-2px); }
    
    .btn-primary { background: var(--accent-cyan); color: #000; font-weight: 600; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 20px rgba(0,245,255,0.4); }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(0,245,255,0.6); transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-ghost { background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
    .btn-ghost:hover { background: rgba(0,245,255,0.1); box-shadow: 0 0 20px rgba(0,245,255,0.3); }
    
    .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
    .btn-danger:hover { background: rgba(255,51,102,0.1); }
    
    .input-field { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text-primary); width: 100%; transition: all 0.3s ease; font-family: 'JetBrains Mono', monospace; }

    .pulse-dot.green { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s ease-in-out infinite; }
    .pulse-dot.red { background: var(--accent-red); animation: blink 0.5s ease-in-out infinite; }
    .pulse-dot.amber { background: var(--accent-amber); animation: pulse 1.5s ease-in-out infinite; }
    
    .sidebar { width: 240px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; transition: all 0.3s ease; }
    .sidebar.collapsed { width: 60px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s ease; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: rgba(0,245,255,0.05); color: var(--text-primary); border-left-color: var(--accent-cyan); }
    .sidebar-item.active { background: rgba(0,245,255,0.1); color: var(--accent-cyan); border-left-color: var(--accent-cyan); }

    .status-badge.up { background: rgba(57,255,20,0.15); color: var(--accent-green); }
    .status-badge.down { background: rgba(255,51,102,0.15); color: var(--accent-red); }
    .status-badge.slow { background: rgba(255,184,0,0.15); color: var(--accent-amber); }
    
    .tab-active { border-bottom: 2px solid var(--accent-cyan); color: var(--accent-cyan); }
    
    .toggle { width: 48px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: all 0.3s ease; }
    .toggle.active { background: var(--accent-cyan); }
    .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: all 0.3s ease; }
    .toggle.active::after { left: 27px; }

    .stat-card:hover { transform: translateY(-4px); }
    .stat-card.cyan { border-color: rgba(0,245,255,0.3); }
    .stat-card.cyan:hover { box-shadow: 0 0 30px rgba(0,245,255,0.3); }
    .stat-card.green { border-color: rgba(57,255,20,0.3); }
    .stat-card.green:hover { box-shadow: 0 0 30px rgba(57,255,20,0.3); }
    .stat-card.amber { border-color: rgba(255,184,0,0.3); }
    .stat-card.amber:hover { box-shadow: 0 0 30px rgba(255,184,0,0.3); }
    .stat-card.red { border-color: rgba(255,51,102,0.3); }
    .stat-card.red:hover { box-shadow: 0 0 30px rgba(255,51,102,0.3); }

      .sidebar.open { transform: translateX(0); }
    }

    async function apiCall(method, endpoint, body = null) {
      const headers = { 'Content-Type': 'application/json' };
      if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
      
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);

      try {
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        if (response.status === 401) {
          authToken = null;
          currentUser = null;
          localStorage.removeItem('pulsegrid_token');
          localStorage.removeItem('pulsegrid_user');
          alert('Session expired - please log in again');
          window.location.reload();
          throw new Error('Session expired');
        }

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || data.message || 'Request failed');
        return data;
      } catch (error) {
        if (error.message === 'Session expired') throw error;
        if (error.message === 'Failed to fetch' || error.message.includes('NetworkError')) {
          throw new Error('Cannot connect to server. Is the backend running on port 5000?');
        }
        throw error;
      }
    }

    const Sparkline = ({ data, color, status }) => {
      if (!data || data.length === 0) return null;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const points = data.map((v, i) => {
        const x = (i / (data.length - 1)) * 100;
        const y = 100 - ((v - min) / range) * 100;
        return `${x},${y}`;
      }).join(' ');
      const areaPoints = `0,100 ${points} 100,100`;
      const statusColor = status === 'down' ? '#FF3366' : status === 'slow' ? '#FFB800' : color;
      
      return (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="sparkline">
          <polygon points={areaPoints} fill={statusColor} className="sparkline-area" />
          <polyline points={points} stroke={statusColor} className="sparkline-line" />
        </svg>
      );
    };

    const LineChart = ({ data, lines, height = 200 }) => {
      if (!data || data.length === 0) return <div className="h-48 flex items-center justify-center text-gray-500">No data</div>;
      
      const allValues = lines.flatMap(l => data.map(d => d[l.key]));
      const max = Math.max(...allValues);
      const min = Math.min(...allValues);
      const range = max - min || 1;
      
      const getY = (val) => 100 - ((val - min) / range) * 100;
      
      return (
        <svg viewBox={`0 0 100 ${height}`} preserveAspectRatio="none" className="w-full" style={{ height }}>
          <defs>
            {lines.map((l, i) => (
              <linearGradient key={i} id={`gradient-${i}`} x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor={l.color} stopOpacity="0.3" />
                <stop offset="100%" stopColor={l.color} stopOpacity="0" />
              </linearGradient>
            ))}
          </defs>
          {lines.map((l, i) => {
            const points = data.map((d, j) => {
              const x = (j / (data.length - 1)) * 100;
              const y = getY(d[l.key]);
              return `${x},${y}`;
            }).join(' ');
            const areaPoints = `0,100 ${points} 100,100`;
            return (
              <g key={i}>
                <polygon points={areaPoints} fill={`url(#gradient-${i})`} />
                <polyline points={points} fill="none" stroke={l.color} strokeWidth="2" />
              </g>
            );
          })}
        </svg>
      );

    const AuthPage = ({ type, onAuth, onBack, onVerifyEmail }) => {
      const [authTab, setAuthTab] = useState(type || 'signup');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [company, setCompany] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (!email || !password) { setError('Please fill in all required fields'); return; }
        if (authTab === 'signup' && !name) { setError('Name is required'); return; }
        if (password.length < 8) { setError('Password must be at least 8 characters'); return; }
        setLoading(true);
        try {
          const endpoint = authTab === 'signup' ? '/auth/signup' : '/auth/login';
          const payload = authTab === 'signup' ? { email, password, full_name: name } : { email, password };
          const data = await apiCall('POST', endpoint, payload);
          
          if (data.emailSent === false && data.message?.includes('resent')) {
            setAuth(data.token, data.user);
            onVerifyEmail(email);
            return;
          }
          
          if (data.emailSent !== false) {
            setAuth(data.token, data.user);
            onAuth({ name: data.user.full_name || data.user.email.split('@')[0], email: data.user.email, ...data.user });
          } else {
            setAuth(data.token, data.user);
            onVerifyEmail(email);
          }
        } catch (err) {
          if (err.message?.includes('verify your email')) {
            onVerifyEmail(email);
          } else {
            setError(err.message || 'Connection failed. Please check if backend is running.');
          }
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center relative">
          <div className="grid-bg" />
          <div className="scanline" />
          <div className="relative z-10 w-full max-w-md px-4">
            <button onClick={onBack} className="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition">
              {ICONS.chevronLeft} Back to home
            </button>
            
            <div className="card-glass p-8">
              <div className="flex items-center justify-center gap-2 mb-6">
                {ICONS.radio}
                <span className="text-2xl font-bold" style={{ fontFamily: 'Syne' }}>PulseGrid</span>
              </div>
              
              <div className="flex border-b border-gray-700 mb-6">
                <button onClick={() => setAuthTab('signup')} className={`flex-1 pb-3 text-center font-medium transition ${authTab === 'signup' ? 'tab-active' : 'text-gray-400 hover:text-white'}`}>
                  Sign Up
                </button>
                <button onClick={() => setAuthTab('login')} className={`flex-1 pb-3 text-center font-medium transition ${authTab === 'login' ? 'tab-active' : 'text-gray-400 hover:text-white'}`}>
                  Log In
                </button>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                {authTab === 'signup' && (
                  <>
                    <div>
                      <label className="block text-sm text-gray-400 mb-1">Full Name *</label>
                      <input type="text" value={name} onChange={e => setName(e.target.value)} className="input-field" placeholder="Kwame Asante" required />
                    </div>
                    <div>
                      <label className="block text-sm text-gray-400 mb-1">Company <span className="text-gray-500">(Optional)</span></label>
                      <input type="text" value={company} onChange={e => setCompany(e.target.value)} className="input-field" placeholder="DevStudio Inc" />
                    </div>
                  </>
                )}
                <div>
                  <label className="block text-sm text-gray-400 mb-1">Email *</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="input-field" placeholder="you@company.com" required />
                </div>
                <div>
                  <label className="block text-sm text-gray-400 mb-1">Password *</label>
                  <div className="relative">
                    <input type={showPassword ? 'text' : 'password'} value={password} onChange={e => setPassword(e.target.value)} className="input-field pr-12" placeholder="********" required />
                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition">
                      {showPassword ? ICONS.eyeOff : ICONS.eye}
                    </button>
                  </div>
                </div>
                {error && <div className="text-red-400 text-sm bg-red-900 p-3 rounded">{error}</div>}
                <button type="submit" disabled={loading} className="btn-primary w-full py-3 flex items-center justify-center gap-2 text-lg">
                  {loading ? (
                    <>
                      <div className="w-5 h-5 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
                      Connecting to PulseGrid...
                    </>
                  ) : authTab === 'signup' ? 'Create Account' : 'Sign In'}
                </button>
              </form>
              
              <div className="mt-6 text-center">
                <span className="text-gray-400 text-sm">{authTab === 'signup' ? 'Already have an account?' : "Don't have an account?"}</span>
                <button onClick={() => setAuthTab(authTab === 'signup' ? 'login' : 'signup')} className="text-cyan-400 text-sm ml-2 hover:underline">
                  {authTab === 'signup' ? 'Log In' : 'Sign Up'}
                </button>
              </div>
              
              {authTab === 'signup' && (
                <div className="mt-4 p-3 bg-cyan-900 border border-cyan-700 rounded-lg text-center">
                  <p className="text-xs text-gray-300">Starting on the <span className="text-cyan-400 font-medium">Free Plan</span> - 5 monitors, 5-min checks. <button className="text-cyan-400 hover:underline">Upgrade anytime.</button></p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const Dashboard = ({ monitors, incidents, onNavigate, loading }) => {

      const [liveData, setLiveData] = useState([]);

      const [dashLoading, setDashLoading] = useState(true);

      const formatTimeAgo = (dateStr) => {
        if (!dateStr) return 'Never';
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
      };

      const loadData = useCallback(async () => {
        setDashLoading(true);
        try {
          const [monitorsData, statsData] = await Promise.all([
            apiCall('GET', '/monitors').catch(() => ({ monitors: [] })),
            apiCall('GET', '/stats/overview').catch(() => ({ total_monitors: 0, monitors_up: 0, monitors_down: 0, monitors_slow: 0, avg_response_ms: 0 }))
          ]);
          
          const monitors = monitorsData.monitors || [];
          
          setLiveData(monitors.map(m => ({
            ...m,
            id: m.id,
            name: m.name,
            url: m.url,
            status: m.status || 'up',
            uptime: m.uptime || 100,
            avgResponse: m.last_check?.response_time_ms || 0,
            lastCheck: m.last_check?.checked_at ? formatTimeAgo(m.last_check.checked_at) : 'Never',
            sparklineData: Array.from({ length: 24 }, () => Math.round(100 + Math.random() * 200)),
            method: m.method || 'GET',
            grade: m.last_check?.grade || null
          })));
          
          setStats({
            total: statsData.total_monitors || monitors.length,
            up: statsData.monitors_up || monitors.filter(m => m.status === 'up').length,
            slow: statsData.monitors_slow || monitors.filter(m => m.status === 'slow').length,
            down: statsData.monitors_down || monitors.filter(m => m.status === 'down').length,
            avgResponse: statsData.avg_response_ms || 0
          });
          
          setChartData(Array.from({ length: 24 }, (_, i) => ({
            time: `${String(i).padStart(2, '0')}:00`,
            kenya: Math.round(200 + Math.random() * 100),
            germany: Math.round(180 + Math.random() * 80),
            usa: Math.round(220 + Math.random() * 120),
          })));
        } catch (err) {
          console.error('Failed to load data:', err);
        } finally {
          setDashLoading(false);
        }
      }, []);

        loadData();
        const interval = setInterval(loadData, 60000);
        return () => clearInterval(interval);

        if (status === 'down') return '[X]';
        if (status === 'slow') return '[!]';
        return '[||]';

                    <div className="h-4 bg-gray-700 rounded w-1/2 mb-3"></div>
                    <div className="h-8 bg-gray-700 rounded w-3/4"></div>
                  </div>

              </div>
            </div>
          </div>

      return (
        <div className="p-6">
          {stats.down > 0 && !dismissed && (

                <span className="text-xl text-red-400">[!]</span>
                <span className="text-red-300">
                  <strong>{liveData.find(m => m.status === 'down')?.name}</strong> has been DOWN for 8 minutes.

              <div className="flex items-center gap-3">
                <button onClick={() => onNavigate('monitor-detail', liveData.find(m => m.status === 'down'))} className="px-4 py-2 bg-red-500 text-black rounded-lg font-bold text-sm hover:bg-red-400 transition">
                  View Incident
                </button>
                <button onClick={() => setDismissed(true)} className="p-2 text-gray-400 hover:text-white">{ICONS.x}</button>
              </div>
            </div>
          )}

              <div className="flex items-center gap-2 mb-3">
                <span className="text-cyan-400">{ICONS.activity}</span>

              <div className="text-4xl font-bold" style={{ fontFamily: 'JetBrains Mono' }}>{stats.total}</div>

            </div>

              <div className="flex items-center gap-2 mb-3">
                <span className="text-amber-400">{ICONS.alert}</span>
                <span className="text-sm text-gray-400">Incidents Today</span>

              <div className="text-4xl font-bold text-amber-400" style={{ fontFamily: 'JetBrains Mono' }}>

                <span className="text-sm text-gray-400">Avg Response</span>
              </div>
              <div className="text-4xl font-bold" style={{ fontFamily: 'JetBrains Mono' }}>

              </div>

          <div className="card-glass p-6 mb-6">
            <h3 className="font-bold mb-4">Response Time (24h)</h3>
            <LineChart 
              data={chartData} 
              lines={[
                { key: 'kenya', color: '#00F5FF', label: 'KE Nairobi' },
                { key: 'germany', color: '#39FF14', label: 'DE Frankfurt' },
                { key: 'usa', color: '#FFB800', label: 'US Virginia' }
              ]}
              height={150}
            />
            <div className="flex items-center justify-center gap-6 mt-4 text-sm">
              <span className="flex items-center gap-2"><span className="w-3 h-3 rounded bg-cyan-400"></span> KE Nairobi</span>
              <span className="flex items-center gap-2"><span className="w-3 h-3 rounded bg-green-400"></span> DE Frankfurt</span>
              <span className="flex items-center gap-2"><span className="w-3 h-3 rounded bg-amber-400"></span> US Virginia</span>
            </div>
          </div>

          <div className="flex items-center justify-between mb-6">
            <h2 className="text-xl font-bold flex items-center gap-3">
              <span>My Monitors</span>
              <span className="flex items-center gap-2 text-xs font-normal" style={{ fontFamily: 'JetBrains Mono' }}>
                <span className="pulse-dot green w-2 h-2"></span>
                <span className="text-green-400">LIVE</span>
              </span>
            </h2>
            <button onClick={() => onNavigate('add-monitor')} className="btn-primary px-6 py-3 flex items-center gap-2">
              {ICONS.plus} Add Monitor
            </button>

          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <div className="md:col-span-2 space-y-3 md:space-y-4">
              {liveData.map((m, i) => (

                      </div>
                    </td>
                  </tr>

              </tbody>
            </table>

          <div className="card-glass p-6">

                { date: 'Apr 8, 2026', time: '09:15 UTC', monitor: 'Auth Service', type: 'SLOW', duration: '8 min', status: 'resolved' },

                  <div className="flex-1">
                    <div className="flex items-center gap-2">
                      <span className="font-medium">{inc.monitor}</span>
                      <span className={`px-2 py-0.5 text-xs rounded ${inc.type === 'DOWN' ? 'bg-red-900 text-red-400' : 'bg-amber-900 text-amber-400'}`}>
                        {inc.type}

                      <span className="text-xs text-gray-500">{inc.status}</span>
                    </div>
                    <div className="text-xs text-gray-500 mt-1">{inc.date} at {inc.time} • Duration: {inc.duration}</div>

                  <button className="text-xs text-cyan-400 hover:underline">View Details</button>
                </div>
              ))}
            </div>
          </div>
        </div>

      <div className="p-6">

        <div className="card-glass p-12 text-center">

    const APIDocsPage = () => (
      <div className="p-6 max-w-4xl mx-auto">
        <h1 className="text-2xl font-bold mb-6" style={{ fontFamily: 'Syne' }}>API Documentation</h1>
        <div className="card-glass p-6 space-y-6">
          <div>
            <h2 className="text-lg font-bold mb-2">Authentication</h2>
            <p className="text-gray-400 text-sm mb-3">All API requests require authentication using a Bearer token in the Authorization header.</p>
            <pre className="bg-gray-900 p-4 rounded-lg text-sm" style={{ fontFamily: 'JetBrains Mono' }}>
Authorization: Bearer YOUR_API_KEY
            </pre>
          </div>
          <div>
            <h2 className="text-lg font-bold mb-2">Endpoints</h2>
            <div className="space-y-3">
              <div className="p-4 bg-gray-900 rounded-lg">
                <div className="flex items-center gap-2 mb-2">
                  <span className="px-2 py-1 bg-green-900 text-green-400 rounded text-xs font-bold">GET</span>
                  <span className="font-mono text-sm">/api/monitors</span>
                </div>
                <p className="text-gray-500 text-sm">List all monitors</p>
              </div>
              <div className="p-4 bg-gray-900 rounded-lg">
                <div className="flex items-center gap-2 mb-2">
                  <span className="px-2 py-1 bg-cyan-900 text-cyan-400 rounded text-xs font-bold">POST</span>
                  <span className="font-mono text-sm">/api/monitors</span>
                </div>
                <p className="text-gray-500 text-sm">Create a new monitor</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    );

    const App = () => {
      const [page, setPage] = useState('landing');
      const [user, setUser] = useState(() => {
        const savedUser = localStorage.getItem('pulsegrid_user');
        return savedUser ? JSON.parse(savedUser) : null;
      });
      const [monitors] = useState(mockMonitors);
      const [incidents] = useState(mockIncidents);
      const [notifications, setNotifications] = useState(mockNotifications);
      const [selectedMonitor, setSelectedMonitor] = useState(null);
      const [toast, setToast] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [showNotifications, setShowNotifications] = useState(false);
      const [showBetaModal, setShowBetaModal] = useState(false);
      const [showShortcutsModal, setShowShortcutsModal] = useState(false);
      const [showCookieConsent, setShowCookieConsent] = useState(!localStorage.getItem('cookie_consent'));
      const [emailVerificationPending, setEmailVerificationPending] = useState(null);
      const [resendCooldown, setResendCooldown] = useState(0);
      const [searchQuery, setSearchQuery] = useState('');
      const [loading, setLoading] = useState(true);
      const searchRef = useRef(null);
      const notifRef = useRef(null);

      useEffect(() => {
        const savedUser = localStorage.getItem('pulsegrid_user');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
          setPage('dashboard');
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const verifyToken = urlParams.get('token');
        if (verifyToken) {
          verifyEmailToken(verifyToken);
          window.history.replaceState({}, '', window.location.pathname);
        }
        
        const timer = setTimeout(() => setLoading(false), 800);
        return () => clearTimeout(timer);
      }, []);

      const verifyEmailToken = async (token) => {
        try {
          const data = await apiCall('GET', `/auth/verify-email?token=${token}`);
          setAuth(data.token, { email: 'verified' });
          setToast({ type: 'success', message: 'Email verified successfully!' });
          setPage('login');
        } catch (err) {
          setToast({ type: 'error', message: err.message || 'Failed to verify email' });
        }
      };

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (notifRef.current && !notifRef.current.contains(e.target)) {
            setShowNotifications(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        let lastKey = '';
        const handleKeyDown = (e) => {
          if (e.key === '?' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            e.preventDefault();
            setShowShortcutsModal(true);
            return;
          }
          if (e.key === 'g' && lastKey === 'g') {
            lastKey = '';
            return;
          }
          if (lastKey === 'g' && user) {
            if (e.key === 'd') { e.preventDefault(); navigate('dashboard'); lastKey = ''; return; }
            if (e.key === 'm') { e.preventDefault(); navigate('monitors'); lastKey = ''; return; }
            if (e.key === 's') { e.preventDefault(); navigate('settings'); lastKey = ''; return; }
          }
          lastKey = e.key;
          if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            e.preventDefault();
            if (user) navigate('add-monitor');
          }
          if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            e.preventDefault();
            searchRef.current?.focus();
          }
          if (e.key === 'Escape') {
            setShowNotifications(false);
            setSidebarOpen(false);
            setShowShortcutsModal(false);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [user]);

      const navigate = (pageName, data = null) => {
        setPage(pageName);
        if (data) setSelectedMonitor(data);
        setSidebarOpen(false);
      };

      const handleAuth = (type) => {
        if (type === 'login' || type === 'signup') setPage(type);
        else if (type === 'landing') setPage('landing');
        else if (type === 'demo') {
          setUser({ name: 'Demo User', email: 'demo@pulsegrid.io', plan: 'starter' });
          setPage('dashboard');
          setToast({ type: 'info', message: 'Welcome to PulseGrid Demo!' });
        }
      };

      const handleLogin = (userData) => {
        setUser(userData);
        setPage('dashboard');
        setToast({ type: 'success', message: `Welcome to PulseGrid, ${userData.name}!` });
        const hasSeenBetaModal = localStorage.getItem('pulsegrid_beta_seen');
        if (!hasSeenBetaModal) {
          setTimeout(() => setShowBetaModal(true), 500);
        }
      };

      const handleSignup = (userData) => {
        setEmailVerificationPending(userData.email);
        setPage('verify-email');
        setResendCooldown(60);
        setToast({ type: 'success', message: 'Account created! Please check your email to verify.' });
      };

      const onVerifyEmail = (email) => {
        setEmailVerificationPending(email);
        setPage('verify-email');
        setResendCooldown(60);
      };

      useEffect(() => {
        if (resendCooldown > 0) {
          const timer = setTimeout(() => setResendCooldown(resendCooldown - 1), 1000);
          return () => clearTimeout(timer);
        }
      }, [resendCooldown]);

      const handleResendEmail = async () => {
        if (resendCooldown > 0) return;
        try {
          await apiCall('POST', '/auth/resend-verification', { email: emailVerificationPending });
          setToast({ type: 'success', message: 'Verification email sent!' });
        } catch (err) {
          setToast({ type: 'error', message: err.message || 'Failed to send email' });
        }
        setResendCooldown(60);
      };

      const handleLogout = () => {
        clearAuth();
        setUser(null);
        setPage('landing');
      };

      const handleCookieAccept = () => {
        localStorage.setItem('cookie_consent', 'accepted');
        setShowCookieConsent(false);
      };

      const handleCookieDecline = () => {
        localStorage.setItem('cookie_consent', 'declined');
        setShowCookieConsent(false);
        setToast({ type: 'warning', message: 'Some features may not work without cookies' });
      };

      const sidebarItems = [
        { icon: ICONS.home, label: 'Dashboard', sub: 'Overview', page: 'dashboard' },
        { icon: ICONS.chart, label: 'Analytics', sub: 'Insights', page: 'analytics' },
        { icon: ICONS.activity, label: 'Monitors', sub: `${monitors.length} active`, page: 'monitors' },
        { icon: ICONS.plus, label: 'Add Monitor', sub: 'Create new', page: 'add-monitor' },
        { icon: ICONS.users, label: 'Team', sub: 'Members', page: 'team' },
        { icon: ICONS.globe, label: 'Status Pages', sub: 'Public page', page: 'status-pages' },
        { icon: ICONS.file, label: 'Reports', sub: 'Downloads', page: 'reports' },
        { icon: ICONS.code, label: 'API Docs', sub: 'Reference', page: 'api-docs' },
        { icon: ICONS.settings, label: 'Settings', sub: 'Account', page: 'settings' },
      ];

      const unreadCount = notifications.filter(n => !n.read).length;

      return (
        <div className="min-h-screen" style={{ background: 'var(--bg-primary)' }}>
          <div className="grid-bg" />
          <div className="scanline" />

          {user && (
            <div className="fixed top-0 left-0 right-0 z-40 bg-gradient-to-r from-cyan-900 to-purple-900 text-center py-2 px-4 text-xs md:text-sm border-b border-cyan-500" style={{ boxShadow: '0 0 20px rgba(0,245,255,0.2)' }}>
              <span className="font-bold text-cyan-300">BETA</span>
              <span className="text-gray-300 ml-1 md:ml-2">Free for</span>
              <span className="font-bold text-white ml-1">{getBetaCountdown()}</span>
              <span className="hidden md:inline text-gray-300 ml-2">— All Pro features!</span>
              <button onClick={() => setShowBetaModal(true)} className="ml-2 md:ml-4 px-2 md:px-3 py-1 bg-cyan-500 text-black text-xs font-bold rounded hover:bg-cyan-400 transition min-h-[44px]">LEARN MORE</button>
            </div>
          )}

          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          {showBetaModal && <BetaPaymentModal isOpen={showBetaModal} onClose={() => setShowBetaModal(false)} setToast={setToast} />}
          {showShortcutsModal && <ShortcutsModal isOpen={showShortcutsModal} onClose={() => setShowShortcutsModal(false)} />}
          {showCookieConsent && <CookieConsent onAccept={handleCookieAccept} onDecline={handleCookieDecline} />}

          {page === 'landing' && <LandingPage onAuth={handleAuth} />}
          {page === 'verify-email' && (
            <div className="p-6 flex flex-col items-center justify-center min-h-[80vh] text-center">
              <div className="text-6xl mb-6">&#128231;</div>
              <h1 className="text-2xl font-bold mb-4">Check your email</h1>
              <p className="text-gray-400 mb-2">We sent a verification link to</p>
              <p className="text-cyan-400 font-bold mb-6">{emailVerificationPending}</p>
              <p className="text-gray-500 text-sm mb-6">Click the link to activate your account.</p>
              <button onClick={handleResendEmail} disabled={resendCooldown > 0} className="btn-primary px-6 py-3 mb-4 disabled:opacity-50">
                {resendCooldown > 0 ? `Resend in ${resendCooldown}s` : 'Resend Email'}
              </button>
              <button onClick={() => setPage('login')} className="text-cyan-400 hover:underline">Already verified? Sign in</button>
            </div>
          )}
          {(page === 'login' || page === 'signup') && <AuthPage type={page} onAuth={page === 'signup' ? handleSignup : handleLogin} onBack={() => handleAuth('landing')} onVerifyEmail={onVerifyEmail} />}

          {user && page !== 'landing' && page !== 'login' && page !== 'signup' && (
            <div className="flex">
              <aside className={`sidebar hidden md:block ${sidebarOpen ? 'open' : ''}`}>
                <div className="p-4 border-b border-gray-700 flex items-center gap-2">
                  {ICONS.radio}
                  <span className="text-xl font-bold" style={{ fontFamily: 'Syne' }}>PulseGrid</span>
                </div>
                <nav className="p-2">
                  {sidebarItems.map((item, i) => (
                    <button key={i} onClick={() => navigate(item.page)} className={`sidebar-item w-full ${page === item.page ? 'active' : ''}`}>

                      <div className="flex flex-col items-start">
                        <span>{item.label}</span>
                        <span className="text-[10px] text-gray-600">{item.sub}</span>
                      </div>
                    </button>
                  ))}
                </nav>
                <div className="absolute bottom-4 left-0 right-0 px-2">
                  <button onClick={handleLogout} className="sidebar-item w-full text-red-400 hover:text-red-300">
                    {ICONS.x}
                    <span>Logout</span>
                  </button>
                </div>
              </aside>

              <main className={`flex-1 transition-all ${sidebarOpen ? 'ml-0' : 'md:ml-60'} pb-20 md:pb-0`}>

                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3 md:gap-4">
                      <button onClick={() => setSidebarOpen(!sidebarOpen)} className="md:hidden p-2 hover:bg-gray-800 rounded-lg">{ICONS.menu}</button>
                      <div className="relative hidden md:block">
                        {ICONS.search}
                        <input ref={searchRef} value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search monitors... (/)" className="bg-gray-900 border border-gray-700 rounded-lg pl-10 pr-4 py-2 text-sm w-64 focus:border-cyan-500 focus:outline-none absolute" style={{ left: '30px', top: '50%', transform: 'translateY(-50%)' }} />
                      </div>
                      <button className="md:hidden p-2 hover:bg-gray-800 rounded-lg">{ICONS.search}</button>
                    </div>
                    <div className="flex items-center gap-2 md:gap-4">
                      <div className="relative" ref={notifRef}>
                        <button onClick={() => setShowNotifications(!showNotifications)} className="p-2 hover:bg-gray-800 rounded-lg relative min-w-[44px] min-h-[44px] flex items-center justify-center">
                          {ICONS.bell}
                          {unreadCount > 0 && <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-xs flex items-center justify-center">{unreadCount}</span>}
                        </button>
                        {showNotifications && (
                          <div className="absolute right-0 top-12 w-[calc(100vw-32px)] md:w-96 max-w-sm card-glass shadow-xl overflow-hidden z-50">

                              <div className="flex items-center gap-2">
                                <span className="font-bold">Notifications</span>
                                <span className="px-2 py-0.5 bg-cyan-900 text-cyan-400 text-xs rounded-full">{unreadCount} unread</span>

                              <div className="flex items-center gap-2">
                                <button onClick={() => setNotifications(notifications.map(item => Object.assign({}, item, {read: true})))} className="text-xs text-cyan-400 hover:text-cyan-300">Mark all read</button>
                                <button onClick={() => setShowNotifications(false)} className="text-gray-400 hover:text-white p-1">{ICONS.x}</button>
                              </div>
                            </div>
                            <div className="max-h-80 overflow-y-auto">

                                <div key={notif.id} onClick={() => setNotifications(notifications.map(item => item.id === notif.id ? Object.assign({}, item, {read: true}) : item))} className={`p-4 border-b border-gray-700 cursor-pointer transition hover:bg-gray-800 ${notif.read ? '' : 'border-l-2 border-l-cyan-500 bg-cyan-900'}`}>
                                  <div className="flex items-start gap-3">
                                    <div className={`w-2 h-2 rounded-full mt-2 flex-shrink-0 ${notif.type === 'error' ? 'bg-red-500' : notif.type === 'warning' ? 'bg-amber-500' : 'bg-green-500'}`}></div>

                                      <p className={`text-sm ${notif.read ? 'text-gray-400' : 'text-white font-medium'}`}>{notif.message}</p>
                                      <p className="text-xs text-gray-500 mt-1">{notif.time}</p>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                      <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-gradient-to-r from-cyan-900 to-purple-900 border border-cyan-500">
                        <span className="text-xs font-bold text-cyan-300">PRO</span>
                        <span className="text-xs text-gray-400">BETA</span>
                      </div>
                      {user.avatar ? (
                        <img src={user.avatar} alt="Profile" className="w-8 h-8 rounded-full object-cover border border-cyan-500" />
                      ) : (
                        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-green-500 flex items-center justify-center font-bold text-sm text-black border border-cyan-400">
                          {((user.name || user.email || 'U').split(' ')[0] || 'U').charAt(0).toUpperCase()}
                        </div>
                      )}
                    </div>
                  </div>
                </header>

                <div className="pb-20 pt-14">
                  {page === 'dashboard' && <Dashboard monitors={monitors} incidents={incidents} onNavigate={navigate} loading={loading} />}
                  {page === 'analytics' && <AnalyticsPage monitors={monitors} />}
                  {page === 'monitors' && <MonitorsPage monitors={monitors} onNavigate={navigate} onToggle={(ids) => setToast({ type: 'info', message: `Paused ${ids.length} monitors` })} onDelete={(ids) => setToast({ type: 'success', message: `Deleted ${ids.length} monitors` })} />}
                  {page === 'add-monitor' && <AddMonitorPage onSave={() => { setToast({ type: 'success', message: '[OK] Monitor created successfully!' }); navigate('dashboard'); }} onBack={() => navigate('dashboard')} user={user} />}
                  {page === 'team' && <TeamPage user={user} setToast={setToast} />}
                  {page === 'monitor-detail' && selectedMonitor && <MonitorDetailPage monitor={selectedMonitor} onBack={() => navigate('dashboard')} />}
                  {page === 'status-pages' && <StatusPagesPage />}
                  {page === 'reports' && <ReportsPage />}
                  {page === 'api-docs' && <APIDocsPage />}
                  {page === 'settings' && <SettingsPage user={user} onLogout={handleLogout} onNavigate={navigate} setToast={setToast} />}
                </div>
              </main>
            </div>
          )}

          {user && (
            <button className="fixed bottom-20 md:bottom-4 left-4 p-3 bg-cyan-500 rounded-full shadow-lg hover:bg-cyan-400 transition z-40 hidden md:flex" style={{ boxShadow: '0 0 20px rgba(0,245,255,0.4)' }}>
              {ICONS.help}
            </button>
          )}

          <div className="fixed bottom-0 left-0 right-0 md:left-60 p-2 bg-gray-900 border-t border-gray-700 text-xs text-gray-500 text-center hidden md:block">
            <span>Press N for new monitor | / for search | ? for help</span>
          </div>

          <nav className="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-700 md:hidden z-50">
            <div className="flex justify-around items-center py-2">
              {[
                { icon: ICONS.home, label: 'Home', page: 'dashboard' },
                { icon: ICONS.activity, label: 'Monitors', page: 'monitors' },
                { icon: ICONS.plus, label: 'Add', page: 'add-monitor' },
                { icon: ICONS.settings, label: 'Settings', page: 'settings' },
              ].map((item, i) => (
                <button key={i} onClick={() => navigate(item.page)} className={`flex flex-col items-center p-3 min-w-[64px] min-h-[44px] justify-center ${page === item.page ? 'text-cyan-400' : 'text-gray-500 hover:text-gray-300'}`}>
                  {item.icon}
                  <span className="text-[10px] mt-1">{item.label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
