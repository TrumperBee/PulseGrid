  <style>
    :root {
      --bg-primary: #050508;
      --bg-secondary: #0A0A12;
      --bg-card: #0D0D18;
      --border: #1A1A2E;
      --accent-cyan: #00F5FF;
      --accent-green: #39FF14;
      --accent-amber: #FFB800;
      --accent-red: #FF3366;
      --text-primary: #E8E8F0;
      --text-secondary: #6B6B8A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
    h1,h2,h3,h4,h5,h6 { font-family: 'Syne', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 60px 60px; animation: gridMove 30s linear infinite; pointer-events: none; z-index: -2; }
    .scanline { position: fixed; inset: 0; pointer-events: none; z-index: 9998; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px); }
    
    @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(60px,60px); } }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .animate-pulse {
      animation: shimmer 1.5s infinite;
      background: linear-gradient(90deg, rgba(26,26,46,1) 0%, rgba(40,40,70,1) 50%, rgba(26,26,46,1) 100%);
      background-size: 200% 100%;
    }
    @keyframes driftUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.15; } 100% { transform: translateY(-100vh) rotate(10deg); opacity: 0; } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes countUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { min-width: 320px; padding: 16px; border-radius: 12px; background: rgba(13,13,24,0.95); backdrop-filter: blur(12px); animation: slideInRight 0.3s ease; }
    .toast.success { border-left: 4px solid var(--accent-green); box-shadow: 0 0 20px rgba(57,255,20,0.3); }
    .toast.error { border-left: 4px solid var(--accent-red); box-shadow: 0 0 20px rgba(255,51,102,0.3); }
    .toast.warning { border-left: 4px solid var(--accent-amber); box-shadow: 0 0 20px rgba(255,184,0,0.3); }
    .toast.info { border-left: 4px solid var(--accent-cyan); box-shadow: 0 0 20px rgba(0,245,255,0.3); }
    
    .stat-card { transition: all 0.3s ease; }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-card.cyan { border-color: rgba(0,245,255,0.3); }
    .stat-card.cyan:hover { box-shadow: 0 0 30px rgba(0,245,255,0.3); }
    .stat-card.green { border-color: rgba(57,255,20,0.3); }
    .stat-card.green:hover { box-shadow: 0 0 30px rgba(57,255,20,0.3); }
    .stat-card.amber { border-color: rgba(255,184,0,0.3); }
    .stat-card.amber:hover { box-shadow: 0 0 30px rgba(255,184,0,0.3); }
    .stat-card.red { border-color: rgba(255,51,102,0.3); }
    .stat-card.red:hover { box-shadow: 0 0 30px rgba(255,51,102,0.3); }
    
    @keyframes alertPulse { 0%,100% { background-color: rgba(255,51,102,0.1); } 50% { background-color: rgba(255,51,102,0.2); } }
    .alert-banner { animation: alertPulse 2s ease-in-out infinite; }
    
    .sparkline { width: 100%; height: 40px; }
    .sparkline-line { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .sparkline-area { opacity: 0.2; }
    
    .card-glass { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; transition: all 0.3s ease; }
    .card-glass:hover { border-color: rgba(0,245,255,0.3); transform: translateY(-2px); }
    
    .btn-primary { background: var(--accent-cyan); color: #000; font-weight: 600; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 20px rgba(0,245,255,0.4); }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(0,245,255,0.6); transform: translateY(-2px); }
    
    .btn-ghost { background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
    .btn-ghost:hover { background: rgba(0,245,255,0.1); box-shadow: 0 0 20px rgba(0,245,255,0.3); }
    
    .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
    .btn-danger:hover { background: rgba(255,51,102,0.1); }
    
    .input-field { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text-primary); width: 100%; transition: all 0.3s ease; font-family: 'JetBrains Mono', monospace; }
    .input-field:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,245,255,0.25); }
    
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .pulse-dot.green { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s ease-in-out infinite; }
    .pulse-dot.red { background: var(--accent-red); animation: blink 0.5s ease-in-out infinite; }
    .pulse-dot.amber { background: var(--accent-amber); animation: pulse 1.5s ease-in-out infinite; }
    
    .sidebar { width: 240px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; transition: all 0.3s ease; }
    .sidebar.collapsed { width: 60px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s ease; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: rgba(0,245,255,0.05); color: var(--text-primary); border-left-color: var(--accent-cyan); }
    .sidebar-item.active { background: rgba(0,245,255,0.1); color: var(--accent-cyan); border-left-color: var(--accent-cyan); }
    
    .particle { position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent-cyan); opacity: 0.12; white-space: nowrap; pointer-events: none; }
    
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-badge.up { background: rgba(57,255,20,0.15); color: var(--accent-green); }
    .status-badge.down { background: rgba(255,51,102,0.15); color: var(--accent-red); }
    .status-badge.slow { background: rgba(255,184,0,0.15); color: var(--accent-amber); }
    .status-badge.paused { background: rgba(107,107,138,0.15); color: var(--text-secondary); }
    
    .tab-active { border-bottom: 2px solid var(--accent-cyan); color: var(--accent-cyan); }
    
    .heatmap-cell { width: 10px; height: 10px; border-radius: 2px; transition: transform 0.2s; }
    .heatmap-cell:hover { transform: scale(1.5); z-index: 10; position: relative; }
    
    .toggle { width: 48px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: all 0.3s ease; }
    .toggle.active { background: var(--accent-cyan); }
    .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: all 0.3s ease; }
    .toggle.active::after { left: 27px; }
    
    .tooltip { position: relative; }
    .tooltip-content { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 1000; }
    .tooltip:hover .tooltip-content { opacity: 1; }
    
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width: 280px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0 !important; }
    }
  </style>
</head>

    async function apiCall(method, endpoint, body = null) {
      const headers = {
        'Content-Type': 'application/json'
      };
      
      if (authToken) {
        headers['Authorization'] = `Bearer ${authToken}`;
      }

      const options = {
        method,
        headers
      };

      if (body) {
        options.body = JSON.stringify(body);
      }

      try {
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        if (response.status === 401) {
          authToken = null;
          currentUser = null;
          localStorage.removeItem('pulsegrid_token');
          localStorage.removeItem('pulsegrid_user');
          showToast('error', 'Session expired - please log in again');
          window.location.reload();
          throw new Error('Session expired');
        }

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || data.message || 'Request failed');
        }

        return data;
      } catch (error) {
        if (error.message === 'Session expired') throw error;
        if (error.message === 'Failed to fetch' || error.message.includes('NetworkError')) {
          throw new Error('Cannot connect to server. Is the backend running on port 5000?');
        }
        throw error;
      }
    }

        const x = (i / (data.length - 1)) * 100;
        const y = 100 - ((v - min) / range) * 100;
        return `${x},${y}`;
      }).join(' ');
      const areaPoints = `0,100 ${points} 100,100`;
      
      const statusColor = status === 'down' ? '#FF3366' : status === 'slow' ? '#FFB800' : color;
      
      return (

        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;

      const getStatusIcon = (status) => {

    const AddMonitorPage = ({ onSave, onBack, user }) => {
      const [step, setStep] = useState(0);
      const [formData, setFormData] = useState({
        name: '', url: '', method: 'GET', authRequired: false, authType: 'bearer', token: '', apiKeyHeader: 'X-API-Key', apiKeyValue: '',
        basicUsername: '', basicPassword: '', headers: [{ key: '', value: '' }],
        requestBody: '{\n  "test": true,\n  "source": "pulsegrid"\n}',
        interval: '5min', timeout: 30, locations: ['kenya', 'germany', 'usa'], 
        expectedStatus: '200', expectedBody: '', unexpectedBody: '', maxResponse: 3000,
        emails: [user?.email || ''], smsAlerts: false, phoneNumber: '+254', 
        slackWebhook: '', discordWebhook: '', alertSensitivity: 3, recoveryAlert: true,
        showSlackHelp: false, showDiscordHelp: false, showAuthHelp: false, headersOpen: false
      });
      const [loading, setLoading] = useState(false);
      const [loadingStep, setLoadingStep] = useState(-1);
      const [showSuccess, setShowSuccess] = useState(false);
      const [showToast, setShowToast] = useState(null);
      const [errors, setErrors] = useState({});

      const update = (key, value) => setFormData(prev => ({ ...prev, [key]: value }));
      const showToastMsg = (msg, type = 'info') => {
        setShowToast({ message: msg, type });
        setTimeout(() => setShowToast(null), 3000);
      };

      const validate = () => {
        const errs = {};
        if (step === 0) {
          if (!formData.name.trim()) errs.name = 'Monitor name is required';
          if (!formData.url.trim()) errs.url = 'URL is required';
          else if (!formData.url.startsWith('https://')) errs.url = '[!] URL must start with https://';
        }
        if (step === 2) {
          if (!formData.emails.some(e => e.trim())) errs.email = 'At least one email is required';
        }
        setErrors(errs);
        return Object.keys(errs).length === 0;
      };

      const nextStep = () => { if (validate()) setStep(s => s + 1); };
      const prevStep = () => setStep(s => s - 1);

      const addEmail = () => setFormData(prev => ({ ...prev, emails: [...prev.emails, ''] }));
      const removeEmail = (i) => setFormData(prev => ({ ...prev, emails: prev.emails.filter((_, idx) => idx !== i) }));
      const updateEmail = (i, val) => setFormData(prev => ({ ...prev, emails: prev.emails.map((e, idx) => idx === i ? val : e) }));

      const addHeader = () => setFormData(prev => ({ ...prev, headers: [...prev.headers, { key: '', value: '' }] }));
      const removeHeader = (i) => setFormData(prev => ({ ...prev, headers: prev.headers.filter((_, idx) => idx !== i) }));
      const updateHeader = (i, field, val) => setFormData(prev => ({ ...prev, headers: prev.headers.map((h, idx) => idx === i ? { ...h, [field]: val } : h) }));

      const handleSubmit = async () => {
        if (!validate()) return;
        setLoading(true);
        setLoadingStep(0);
        
        try {
          const headersObj = {};
          formData.headers.forEach(h => {
            if (h.key && h.value) headersObj[h.key] = h.value;
          });

          let authValue = null;
          if (formData.authRequired) {
            if (formData.authType === 'bearer') {
              authValue = formData.token;
            } else if (formData.authType === 'apikey') {
              authValue = JSON.stringify({ headerName: formData.apiKeyHeader, value: formData.apiKeyValue });
            } else if (formData.authType === 'basic') {
              authValue = `${formData.basicUsername}:${formData.basicPassword}`;
            }
          }

          const monitorData = {
            name: formData.name,
            url: formData.url,
            method: formData.method,
            headers: headersObj,
            body: formData.requestBody,
            auth_type: formData.authRequired ? formData.authType : 'none',
            auth_value: authValue,
            interval_seconds: formData.interval === '1min' ? 60 : formData.interval === '5min' ? 300 : 600,
            timeout_seconds: formData.timeout,
            locations: formData.locations,
            expected_status_code: parseInt(formData.expectedStatus),
            response_must_contain: formData.expectedBody || null,
            response_must_not_contain: formData.unexpectedBody || null,
            max_response_ms: parseInt(formData.maxResponse)
          };

          setLoadingStep(1);
          const data = await apiCall('POST', '/monitors', monitorData);
          
          setLoadingStep(2);
          await new Promise(r => setTimeout(r, 500));
          
          setLoadingStep(3);
          await new Promise(r => setTimeout(r, 500));
          
          setLoading(false);
          setLoadingStep(-1);
          setShowSuccess(true);
          
        } catch (err) {
          setLoading(false);
          setLoadingStep(-1);
          showToastMsg(err.message || 'Failed to create monitor', 'error');
        }
      };

      const loadingMessages = [
        '-> Saving monitor configuration...',
        '-> Registering with Nairobi node KE...',
        '-> Registering with Frankfurt node DE...',
        '-> Registering with New York node US...',
        '[OK] First ping successful -- 234ms'
      ];

      if (showSuccess) {
        return (
          <div className="p-6 max-w-lg mx-auto text-center relative overflow-hidden" style={{ minHeight: 400 }}>
            <div className="absolute inset-0 pointer-events-none" style={{ animation: 'confetti 1s ease-out forwards' }}>
              {['*', '*', '*', '*', '*'].map((emoji, i) => (
                <span key={i} style={{
                  position: 'absolute', left: `${10 + i * 20}%`, top: '-20px',
                  animation: `fall ${1 + i * 0.2}s ease-in forwards`,

              ))}

            <h2 className="text-2xl font-bold mb-2" style={{ fontFamily: 'Syne' }}>Monitor Created!</h2>

            <p className="text-gray-500 text-sm mb-6">You'll receive an alert if it goes down for more than 15 minutes.</p>
            <button onClick={onBack} className="btn-primary px-8 py-3 rounded-lg text-lg">Go to Dashboard</button>
          </div>
        );
      }

      const steps = ['Endpoint Setup', 'Check Settings', 'Alerts'];

      return (
        <div className="p-6 max-w-3xl mx-auto">

            <div className={`toast ${showToast.type}`} style={{ position: 'fixed', top: 20, right: 20, zIndex: 1000 }}>
              <span>{showToast.message}</span>
            </div>

                    {i < step ? ICONS.check : i + 1}
                  </div>
                  <span className="text-sm hidden sm:inline">{s}</span>
                </div>
                {i < steps.length - 1 && <div className={`flex-1 h-0.5 mx-2 ${i < step ? 'bg-cyan-500' : 'bg-gray-700'}`} style={{ minWidth: '20px' }} />}

            <div className="card-glass p-12">
              <div className="font-mono text-sm space-y-2" style={{ fontFamily: 'JetBrains Mono' }}>

              {step === 0 && (
                <>
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">Monitor Name *</label>
                    <input type="text" value={formData.name} onChange={e => update('name', e.target.value)} className={`input-field ${errors.name ? 'border-red-500' : ''}`} placeholder="e.g. My Tournament API" />
                    {errors.name && <p className="text-red-400 text-xs mt-1">{errors.name}</p>}
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-1">URL *</label>
                    <div className="relative">
                      <input type="text" value={formData.url} onChange={e => update('url', e.target.value)} className={`input-field ${errors.url ? 'border-red-500' : ''}`} placeholder="https://your-api.com/health" />
                      <button className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-cyan-400" title="URL info">
                        <span className="text-lg">?</span>

            status: result.status_code || 0,
            time: result.response_time_ms || 0,
            ttfb: result.ttfb || 0,
            dns: result.dns_time_ms || 0,
            tcp: result.connect_time_ms || 0,
            tls: result.tls_time_ms || 0,
            headers: {},
            body: result.response_body_preview || '',
            location: result.location || 'primary',
            timestamp: result.checked_at ? new Date(result.checked_at).toLocaleString() : new Date().toLocaleString(),
            isSuccessful: result.is_successful,
            error: result.error_message
          };
          setTestResult(testData);
        } catch (err) {
          const testData = {
            status: 0,
            time: 0,
            ttfb: 0,
            dns: 0,
            tcp: 0,
            tls: 0,
            headers: {},
            body: '',
            location: 'primary',
            timestamp: new Date().toLocaleString(),
            isSuccessful: false,
            error: err.message

          setTestResult(testData);

        setTesting(false);

        const blob = new Blob([report], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `incident-${incident.id}-report.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

        clearAuth();
        setUser(null);
        setPage('landing');
      };

      const sidebarItems = [
        { icon: ICONS.home, label: 'Dashboard', page: 'dashboard' },
        { icon: ICONS.activity, label: 'Monitors', page: 'monitors' },
        { icon: ICONS.plus, label: 'Add Monitor', page: 'add-monitor' },
        { icon: ICONS.globe, label: 'Status Pages', page: 'status-pages' },
        { icon: ICONS.file, label: 'Reports', page: 'reports' },
        { icon: ICONS.code, label: 'API Docs', page: 'api-docs' },
        { icon: ICONS.settings, label: 'Settings', page: 'settings' },
      ];

      const unreadCount = notifications.filter(n => !n.read).length;

      return (
        <div className="min-h-screen" style={{ background: darkMode ? 'var(--bg-primary)' : '#f0f0f0' }}>
          <div className="grid-bg" />
          <div className="scanline" />

          {toast && <Toast {...toast} onClose={() => setToast(null)} />}

          {page === 'landing' && <LandingPage onAuth={handleAuth} />}
          {(page === 'login' || page === 'signup') && <AuthPage type={page} onAuth={handleLogin} onBack={() => handleAuth('landing')} />}

          {user && page !== 'landing' && page !== 'login' && page !== 'signup' && (
            <div className="flex">
              <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                <div className="p-4 border-b border-gray-800 flex items-center gap-2">
                  {ICONS.radio}
                  <span className="text-xl font-bold" style={{ fontFamily: 'Syne' }}>PulseGrid</span>
                </div>
                <nav className="p-2">
                  {sidebarItems.map((item, i) => (
                    <button key={i} onClick={() => navigate(item.page)} className={`sidebar-item w-full ${page === item.page ? 'active' : ''}`}>
                      {item.icon}
                      <span className="sidebar.collapsed ? 'hidden' : ''">{item.label}</span>
                    </button>
                  ))}
                </nav>
                <div className="absolute bottom-4 left-0 right-0 px-2">
                  <button onClick={handleLogout} className="sidebar-item w-full text-red-400 hover:text-red-300">
                    {ICONS.x}
                    <span>Logout</span>
                  </button>
                </div>
              </aside>

              <main className={`flex-1 transition-all ${sidebarOpen ? 'ml-0' : 'md:ml-60'}`}>
                <header className="sticky top-0 z-30 bg-black border-gray-700 backdrop-blur-lg border-b border-gray-800 px-6 py-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <button onClick={() => setSidebarOpen(!sidebarOpen)} className="md:hidden p-2 hover:bg-white/10 rounded-lg">{ICONS.menu}</button>
                      <div className="relative hidden md:block">
                        {ICONS.search}
                        <input ref={searchRef} value={searchQuery} onChange={e => { setSearchQuery(e.target.value); setShowSearch(true); }} onFocus={() => setShowSearch(true)} placeholder="Search monitors... (/)" className="bg-black border-gray-700 border border-gray-700 rounded-lg pl-10 pr-4 py-2 text-sm w-64 focus:border-cyan-500 focus:outline-none" style={{ position: 'absolute', left: 0, top: '50%', transform: 'translateY(-50%)', marginLeft: '30px' }} />
                        {showSearch && searchQuery && (
                          <div className="absolute top-full mt-2 left-0 w-80 card-glass shadow-xl overflow-hidden z-50">
                            {monitors.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase()) || m.url.toLowerCase().includes(searchQuery.toLowerCase())).length > 0 ? (
                              monitors.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase()) || m.url.toLowerCase().includes(searchQuery.toLowerCase())).map(m => (
                                <div key={m.id} onClick={() => { setSelectedMonitor(m); navigate('monitor-detail'); setShowSearch(false); setSearchQuery(''); }} className="p-3 hover:bg-white/5 cursor-pointer border-b border-gray-700 last:border-0">
                                  <div className="text-sm font-medium">{m.name}</div>
                                  <div className="text-xs text-gray-500">{m.url}</div>
                                </div>
                              ))
                            ) : (
                              <div className="p-4 text-center text-gray-500 text-sm">No monitors found — <button onClick={() => navigate('add-monitor')} className="text-cyan-400">Add one?</button></div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="flex items-center gap-4">
                      <button onClick={() => setDarkMode(!darkMode)} className="p-2 hover:bg-white/10 rounded-lg">{darkMode ? ICONS.sun : ICONS.moon}</button>
                      <div className="relative">
                        <button onClick={() => setShowNotifications(!showNotifications)} className="p-2 hover:bg-white/10 rounded-lg relative">
                          {ICONS.bell}
                          {unreadCount > 0 && <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-xs flex items-center justify-center">{unreadCount}</span>}
                        </button>
                        {showNotifications && (
                          <div className="absolute right-0 top-12 w-96 card-glass shadow-xl overflow-hidden">
                            <div className="flex items-center justify-between p-4 border-b border-gray-800">
                              <div className="flex items-center gap-2">
                                <span className="font-bold">Notifications</span>
                                <span className="px-2 py-0.5 bg-cyan-900 text-cyan-400 text-xs rounded-full">{unreadCount} unread</span>
                              </div>
                              <button onClick={() => setNotifications(notifications.map(n => ({ ...n, read: true })))} className="text-xs text-cyan-400 hover:text-cyan-300">Mark all read</button>
                            </div>
                            <div className="max-h-80 overflow-y-auto">
                              {notifications.map(n => (
                                <div key={n.id} onClick={() => setNotifications(notifications.map(notif => notif.id === n.id ? { ...notif, read: true } : notif))} className={`p-4 border-b border-gray-700 cursor-pointer transition hover:bg-white/5 ${n.read ? '' : 'bg-cyan-950'}`}>
                                  <div className="flex items-start gap-3">
                                    <div className={`w-2 h-2 rounded-full mt-2 flex-shrink-0 ${n.type === 'error' ? 'bg-red-500' : n.type === 'warning' ? 'bg-amber-500' : 'bg-green-500'}`}></div>
                                    <div className="flex-1 min-w-0">
                                      <p className={`text-sm ${n.read ? 'text-gray-400' : 'text-white font-medium'}`}>{n.message}</p>
                                      <p className="text-xs text-gray-500 mt-1">{n.time}</p>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                            <div className="p-3 border-t border-gray-800 text-center">
                              <button className="text-sm text-cyan-400 hover:text-cyan-300">View all notifications →</button>
                            </div>
                          </div>
                        )}
                      </div>
                      <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-900 border border-cyan-700">
                        <span className="text-xs text-cyan-400">Free</span>
                      </div>
                      <button className="btn-primary px-4 py-2 rounded-lg text-sm hidden md:block">Upgrade</button>
                      <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-green-500 flex items-center justify-center font-bold text-sm text-black">
                        {user.name.split(' ').map(n => n[0]).join('')}
                      </div>
                    </div>
                  </div>
                </header>

                <div className="pb-20">
                  {page === 'dashboard' && <Dashboard monitors={monitors} incidents={incidents} onNavigate={navigate} loading={loading} />}
                  {page === 'add-monitor' && <AddMonitorPage onSave={(data) => { setToast({ type: 'success', message: '[OK] Monitor created successfully!' }); navigate('dashboard'); }} onBack={() => navigate('dashboard')} />}
                  {page === 'monitor-detail' && selectedMonitor && <MonitorDetailPage monitor={selectedMonitor} onBack={() => navigate('dashboard')} />}
                  {page === 'status-pages' && <StatusPagesPage />}
                  {page === 'reports' && <ReportsPage />}
                  {page === 'api-docs' && <APIDocsPage />}
                  {page === 'settings' && <SettingsPage user={user} onLogout={handleLogout} onNavigate={navigate} setToast={setToast} />}
                </div>
              </main>
            </div>
          )}

          {user && page === 'dashboard' && (
            <div className="fixed bottom-4 right-4 w-72 card-glass p-4 shadow-xl" style={{ animation: 'floatUp 0.3s ease' }}>
              <div className="flex items-center justify-between mb-3">
                <span className="font-bold">Setup Checklist</span>
                <button onClick={() => setChecklist([true, true, true, true])} className="text-xs text-cyan-400">Complete all</button>
              </div>
              <div className="space-y-2">
                {['Add your first monitor', 'Set up email alerts', 'Create a status page', 'Invite a teammate'].map((item, i) => (
                  <label key={i} className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={checklist[i]} onChange={() => setChecklist(prev => prev.map((c, j) => j === i ? !c : c))} style={{ accentColor: 'var(--accent-cyan)' }} />
                    <span className={`text-sm ${checklist[i] ? 'line-through text-gray-500' : ''}`}>{item}</span>
                  </label>
                ))}
              </div>
              <div className="mt-3 text-xs text-gray-500">{checklist.filter(c => c).length}/4 complete</div>
            </div>
          )}

          {user && (
            <>
              <button onClick={() => setShowIncidentGuide(true)} className="fixed bottom-4 left-4 p-3 bg-cyan-500 rounded-full shadow-lg hover:bg-cyan-400 transition z-40" style={{ boxShadow: '0 0 20px rgba(0,245,255,0.4)' }}>
                {ICONS.help}
              </button>

              <div className="fixed bottom-32 right-4 z-40">
                {showChecklist && (
                  <div className="card-glass shadow-xl w-72 mb-2" style={{ animation: 'floatUp 0.3s ease' }}>
                    <div onClick={() => setShowChecklist(false)} className="p-3 border-b border-gray-800 cursor-pointer flex items-center justify-between">
                      <div>
                        <span className="font-bold text-sm">Getting Started — {completedCount}/4 complete</span>
                        <div className="w-48 bg-gray-800 rounded-full h-1.5 mt-1">
                          <div className="bg-cyan-500 h-1.5 rounded-full transition-all" style={{ width: `${(completedCount / 4) * 100}%` }}></div>
                        </div>
                      </div>
                      <span className="text-gray-400">{ICONS.chevronDown}</span>
                    </div>
                    {showChecklist && (
                      <div className="p-3 space-y-2">
                        {checklistItems.map((item, i) => (
                          <div key={i} className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <span className={item.done ? 'text-green-400' : 'text-gray-500'}>{item.done ? ICONS.check : '○'}</span>
                              <span className={`text-sm ${item.done ? 'text-gray-500 line-through' : 'text-gray-300'}`}>{item.label}</span>
                            </div>
                            {!item.done && item.action && (
                              <button onClick={() => item.action()} className="text-xs text-cyan-400 hover:text-cyan-300">Do this →</button>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
                {!showChecklist && (
                  <button onClick={() => setShowChecklist(true)} className="card-glass p-3 shadow-xl">
                    <span className="text-sm">Getting Started {completedCount}/4</span>
                  </button>
                )}
              </div>

              <div className="fixed bottom-4 right-4 z-40">
                {!showChat && (
                  <button onClick={() => setShowChat(true)} className="p-4 bg-cyan-500 rounded-full shadow-lg hover:bg-cyan-400 transition" style={{ boxShadow: '0 0 20px rgba(0,245,255,0.4)' }}>
                    <span className="text-xl">KE</span>
                  </button>
                )}
                {showChat && (
                  <div className="card-glass shadow-xl w-80" style={{ animation: 'floatUp 0.3s ease' }}>
                    <div className="p-3 border-b border-gray-800 flex items-center justify-between">
                      <div>
                        <span className="font-bold text-sm">PulseGrid Support KE</span>
                        <div className="flex items-center gap-1 mt-0.5">
                          <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                          <span className="text-xs text-green-400">Online</span>
                        </div>
                        <p className="text-xs text-gray-500">Nairobi team — Mon–Fri, 8am–6pm EAT</p>
                      </div>
                      <button onClick={() => setShowChat(false)} className="text-gray-400 hover:text-white">{ICONS.x}</button>
                    </div>
                    <div className="p-3 max-h-48 overflow-y-auto space-y-2">
                      {chatHistory.length === 0 && (
                        <p className="text-sm text-gray-400">Hi! How can we help you today?</p>
                      )}
                      {chatHistory.map((msg, i) => (
                        <div key={i} className={`text-sm ${msg.from === 'user' ? 'text-cyan-400 text-right' : 'text-gray-300'}`}>{msg.text}</div>
                      ))}
                    </div>
                    <div className="p-2 border-t border-gray-800 flex flex-wrap gap-1">
                      {['How do I add a monitor?', 'My alert isn\'t working', 'Upgrade my plan', 'Billing question'].map((q, i) => (
                        <button key={i} onClick={() => { setChatHistory([...chatHistory, { from: 'user', text: q }, { from: 'bot', text: 'Thanks! Our team will respond shortly. Average reply time: 2 hours.' }]); }} className="text-xs bg-white/5 px-2 py-1 rounded hover:bg-white/10">{q}</button>
                      ))}
                    </div>
                    <div className="p-2 border-t border-gray-800 flex gap-2">
                      <input value={chatMessage} onChange={e => setChatMessage(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && chatMessage) { setChatHistory([...chatHistory, { from: 'user', text: chatMessage }, { from: 'bot', text: 'Thanks! Our team will respond shortly. Average reply time: 2 hours.' }]); setChatMessage(''); }}} placeholder="Type a message..." className="flex-1 bg-black border-gray-700 border border-gray-700 rounded px-3 py-2 text-sm focus:border-cyan-500 focus:outline-none" />
                      <button onClick={() => { if (chatMessage) { setChatHistory([...chatHistory, { from: 'user', text: chatMessage }, { from: 'bot', text: 'Thanks! Our team will respond shortly. Average reply time: 2 hours.' }]); setChatMessage(''); }}} className="btn-primary px-3 py-2 rounded-lg">{ICONS.zap}</button>
                    </div>
                  </div>
                )}
              </div>

              <div className="fixed bottom-0 left-0 right-0 md:left-60 p-2 bg-black border-gray-700 border-t border-gray-800 text-xs text-gray-500 text-center">
                <span className="md:hidden">[Kbd] N = New Monitor</span>
                <span className="hidden md:inline">[Kbd] N = New Monitor | / = Search | ? = Help</span>
              </div>
            </>
          )}

          {showIncidentGuide && <IncidentGuide onClose={() => setShowIncidentGuide(false)} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
